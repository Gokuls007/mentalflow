apiVersion: apps/v1
kind: Deployment
metadata:
  name: mentalflow-backend
  labels:
    app: mentalflow
    component: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mentalflow
      component: backend
  template:
    metadata:
      labels:
        app: mentalflow
        component: backend
    spec:
      containers:
      - name: mentalflow-backend
        image: mentalflow-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: mentalflow-secrets
        - configMapRef:
            name: mentalflow-config
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /api/v1/chat/health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mentalflow-backend-svc
spec:
  selector:
    app: mentalflow
    component: backend
  ports:
  - port: 80
    targetPort: 8000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mentalflow-frontend
  labels:
    app: mentalflow
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mentalflow
      component: frontend
  template:
    metadata:
      labels:
        app: mentalflow
        component: frontend
    spec:
      containers:
      - name: mentalflow-frontend
        image: mentalflow-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: mentalflow-frontend-svc
spec:
  selector:
    app: mentalflow
    component: frontend
  ports:
  - port: 80
    targetPort: 80
  type: LoadBalancer
